# CI workflow for search relevance contract tests
# Runs the search orchestrator test suite on every push and PR
# These tests verify search parsing, scoring, and facet contracts
# without requiring Qt, CLIP, FAISS, or a database.

name: Search Relevance Tests

on:
  push:
    paths:
      - 'services/search_orchestrator.py'
      - 'services/smart_find_service.py'
      - 'config/search_config.py'
      - 'tests/test_search_orchestrator.py'
  pull_request:
    paths:
      - 'services/search_orchestrator.py'
      - 'services/smart_find_service.py'
      - 'config/search_config.py'
      - 'tests/test_search_orchestrator.py'

jobs:
  relevance-tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.10', '3.11', '3.12']

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install test dependencies
        run: |
          pip install pytest numpy Pillow

      - name: Run relevance contract tests
        run: |
          python -m pytest tests/test_search_orchestrator.py -v --tb=short --override-ini="addopts=" -m "not requires_qt"

      - name: Verify test count
        run: |
          count=$(python -m pytest tests/test_search_orchestrator.py --collect-only -q --override-ini="addopts=" 2>/dev/null | tail -1 | grep -oP '\d+(?= test)')
          echo "Found $count tests"
          if [ "$count" -lt 126 ]; then
            echo "ERROR: Expected at least 126 relevance tests, found $count"
            exit 1
          fi
